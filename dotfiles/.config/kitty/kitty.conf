# ==========================================
# CONFIGURACIÓN DE KITTY (Basada en Sakura)
# ==========================================

# --- Fuentes ---
font_family      Mononoki Nerd Font Propo
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# --- Cursor ---
# Cambiar el bloque cian por una línea roja fina (como en Sakura)
cursor_shape beam
cursor #ff0000
cursor_blink_interval 0

# --- Colores y Opacidad ---
# Foreground rgb(255,255,255)
foreground       #ffffff
# Background rgb(5,5,15) con 0.85 de opacidad
background       #05050f
background_opacity 0.85

# --- Comportamiento ---
# scroll_lines=4096
scrollback_lines 4096
# copy_on_select=false
copy_on_select   no
# word_chars=-,./?%&#_~:
select_by_word_characters -,./?%&#_~:
# audible_bell=Yes y urgent_bell=Yes
enable_audio_bell yes
window_alert_on_bell yes

# --- Pestañas (Tabs) ---
# tabs_on_bottom=false (Arriba)
tab_bar_edge     top
# show_tab_bar=multiple
tab_bar_min_tabs 2
# Estilo visual de las pestañas (Kitty ofrece varios, powerline se ve muy bien)
tab_bar_style    powerline

# --- Tamaño de ventana inicial ---
# window_columns=80, window_rows=24
remember_window_size  no
initial_window_width  80c
initial_window_height 24c

# --- Atajos de Teclado (Keybindings) ---
# Kitty usa Ctrl+Shift por defecto como tu "accelerator=5" en Sakura

# Pestañas
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
# Cambiar de pestaña (Sakura usaba Alt + Flechas)
map alt+left previous_tab
map alt+right next_tab
# Renombrar pestaña
map ctrl+shift+n set_tab_title

# Portapapeles
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Ventanas y Pantalla Completa
map ctrl+shift+o new_os_window
map f11 toggle_fullscreen

# Tamaño de fuente
map ctrl+shift+plus change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
